  <!-- Harar -->
  <circle cx="65" cy="54" r="8" fill="hsl(145,55%,50%)" opacity="0.12"/>
  <circle cx="65" cy="54" r="5" fill="hsl(145,45%,55%)" opacity="0.85"/>
  <circle cx="65" cy="54" r="1.2" fill="white" opacity="0.9"/>
  <text x="65" y="64" text-anchor="middle" font-size="2.6" font-weight="500" fill="hsl(145,35%,25%)">Harar</text>
  <!-- Hawassa -->
  <circle cx="51" cy="65" r="9" fill="hsl(145,55%,50%)" opacity="0.12"/>
  <circle cx="51" cy="65" r="6" fill="hsl(145,45%,55%)" opacity="0.85"/>
  <circle cx="51" cy="65" r="1.2" fill="white" opacity="0.9"/>
