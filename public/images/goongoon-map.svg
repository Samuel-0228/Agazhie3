  />
  <!-- Connection lines from Addis Ababa to other cities -->
  <line x1="52" y1="47" x2="37" y2="28" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <line x1="52" y1="47" x2="43" y2="20" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <line x1="52" y1="47" x2="63" y2="33" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <line x1="52" y1="47" x2="29" y2="52" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <line x1="52" y1="47" x2="65" y2="54" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <line x1="52" y1="47" x2="51" y2="65" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <line x1="52" y1="47" x2="73" y2="44" stroke="hsl(145,50%,55%)" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.6"/>
